<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFM Forecast Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body class="light-theme">
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>DFM Forecast Dashboard</h1>
            <div class="header-controls">
                <div class="horizon-select">
                    <label for="horizon">Horizon:</label>
                    <select id="horizon">
                        <option value="1">1 Month</option>
                        <option value="4">4 Months</option>
                        <option value="12" selected>12 Months</option>
                        <option value="24">24 Months</option>
                        <option value="60">60 Months</option>
                    </select>
                </div>

                <!-- Method visibility toggles -->
                <div class="method-toggles">
                    <span class="method-toggles-label">Show:</span>
                    <button id="toggle-dfm" class="toggle-btn toggle-active" title="Toggle DFM forecast">
                        <span class="toggle-dot dfm-dot"></span> DFM
                    </button>
                    <button id="toggle-bayesian" class="toggle-btn toggle-active" title="Toggle Bayesian forecast">
                        <span class="toggle-dot bay-dot"></span> Bayesian
                    </button>
                    <button id="toggle-ci" class="toggle-btn toggle-active" title="Toggle 90% confidence interval">
                        <span class="toggle-dot ci-dot"></span> 90% CI
                    </button>
                </div>

                <button id="theme-toggle" class="theme-btn">Dark Mode</button>
            </div>
        </header>

        <div class="main-content">
            <!-- Left Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>Select Groups</h3>
                    <div class="group-controls">
                        <button id="select-all-groups" class="btn-small">Select All</button>
                        <button id="clear-all-groups" class="btn-small">Clear All</button>
                    </div>
                    <div id="group-checkboxes" class="checkbox-list">
                        <!-- Generated by JS -->
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>Select Series</h3>
                    <div class="series-controls">
                        <button id="select-all-series" class="btn-small">Select All</button>
                        <button id="clear-all-series" class="btn-small">Clear All</button>
                    </div>
                    <div class="series-search">
                        <input type="text" id="series-search" placeholder="Search series...">
                    </div>
                    <div id="series-checkboxes" class="checkbox-list series-list">
                        <!-- Generated by JS -->
                    </div>
                </div>

                <div class="sidebar-footer">
                    <span id="selected-count">0 series selected</span>
                </div>
            </aside>

            <!-- Right Content Area -->
            <main class="content">
                <!-- Metrics Section -->
                <section class="metrics-section">
                    <h2>Summary Metrics</h2>
                    <div class="table-container">
                        <table id="metrics-table">
                            <thead>
                                <tr>
                                    <th rowspan="2" data-sort="series">Series <span class="sort-icon"></span></th>
                                    <th rowspan="2" data-sort="group">Group <span class="sort-icon"></span></th>
                                    <th colspan="3" class="method-header dfm-header">DFM Forecast</th>
                                    <th colspan="3" class="method-header bay-header">Bayesian Forecast</th>
                                </tr>
                                <tr>
                                    <th data-sort="dfm_rmse">RMSE <span class="sort-icon"></span></th>
                                    <th data-sort="dfm_mape">MAPE (%) <span class="sort-icon"></span></th>
                                    <th data-sort="dfm_correlation">Corr. <span class="sort-icon"></span></th>
                                    <th data-sort="bay_rmse">RMSE <span class="sort-icon"></span></th>
                                    <th data-sort="bay_mape">MAPE (%) <span class="sort-icon"></span></th>
                                    <th data-sort="bay_correlation">Corr. <span class="sort-icon"></span></th>
                                </tr>
                            </thead>
                            <tbody id="metrics-body">
                                <!-- Generated by JS -->
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Charts Section -->
                <section class="charts-section">
                    <h2>Time Series Charts</h2>
                    <div id="charts-container">
                        <!-- Generated by JS -->
                    </div>
                </section>

                <!-- Loading Overlay -->
                <div id="loading" class="loading-overlay">
                    <div class="spinner"></div>
                    <p>Loading data...</p>
                </div>
            </main>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
